<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — To-Do Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EFF6FB;
    --surface: #FFFFFF;
    --surface2: #DFF0FA;
    --text: #0D1F2D;
    --text2: #4A6478;
    --text3: #8AAABB;
    --border: rgba(13,31,45,0.1);
    --border2: rgba(13,31,45,0.18);
    --accent: #1A6FA8;
    --accent-light: #D6ECFA;
    --red: #8B2E2E;
    --red-light: #F5E8E8;
    --amber: #7A4E1A;
    --amber-light: #F5EDD8;
    --green: #2D5A3D;
    --green-light: #DFF0E5;
    --blue: #1E3A5F;
    --blue-light: #E0EAF5;
    --purple: #3D2B6B;
    --purple-light: #EAE4F5;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--accent);
  }

  .nav-section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    color: var(--text2);
    transition: all 0.15s;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }

  .nav-item .count {
    font-size: 11px;
    background: var(--surface2);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text3);
  }

  .nav-item.active .count {
    background: var(--accent);
    color: white;
  }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 12px;
    color: var(--text3);
    text-align: center;
  }

  /* Main */
  .main {
    padding: 2.5rem 3rem;
    max-width: 800px;
  }

  .top-bar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .page-sub {
    font-size: 14px;
    color: var(--text3);
    margin-top: 4px;
  }

  .add-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .add-btn:hover { opacity: 0.85; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .stat-num { font-size: 24px; font-weight: 300; color: var(--text); font-family: 'DM Serif Display', serif; }

  /* Form */
  .form-overlay {
    position: fixed; inset: 0;
    background: rgba(26,24,20,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
  }

  .form-overlay.open { display: flex; }

  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .form-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 1.5rem;
  }

  .form-group { margin-bottom: 1rem; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }

  .btn-cancel:hover { background: var(--surface2); }

  .btn-save {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }

  .btn-save:hover { opacity: 0.85; }

  /* Priority filters */
  .prio-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .prio-pill {
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--text2);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .prio-pill:hover { border-color: var(--border2); }
  .prio-pill.active { background: var(--text); color: white; border-color: var(--text); }

  /* Task list */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 1.5rem 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s, transform 0.1s;
    cursor: default;
  }

  .task-item:hover { border-color: var(--border2); transform: translateY(-1px); }
  .task-item.done { opacity: 0.45; }

  .check-wrap {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: transparent;
  }

  .check-wrap:hover { border-color: var(--accent); }

  .check-wrap.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-wrap.checked svg { display: block; }
  .check-wrap svg { display: none; width: 10px; height: 10px; }

  .task-body { flex: 1; min-width: 0; }

  .task-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
  }

  .task-item.done .task-name {
    text-decoration: line-through;
    color: var(--text3);
  }

  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 7px;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 400;
  }

  .prio-high { background: var(--red-light); color: var(--red); }
  .prio-medium { background: var(--amber-light); color: var(--amber); }
  .prio-low { background: var(--green-light); color: var(--green); }

  .cat-work { background: var(--blue-light); color: var(--blue); }
  .cat-personal { background: var(--purple-light); color: var(--purple); }
  .cat-health { background: var(--green-light); color: var(--green); }
  .cat-finance { background: var(--amber-light); color: var(--amber); }

  .due-badge {
    font-size: 11px;
    color: var(--text3);
  }

  .due-badge.overdue { color: var(--red); font-weight: 500; }
  .due-badge.today { color: var(--amber); font-weight: 500; }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .task-del-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 18px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .task-del-btn:hover { color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }

  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .lang-switcher { display: flex; gap: 6px; align-items: center; margin-bottom: 1rem; }
  .lang-btn { font-size: 12px; padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; color: var(--text2); background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .lang-btn:hover { background: var(--surface2); }
  .lang-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 1.5rem 1rem; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="logo">Task<span>Flow</span></div>

    <div>
      <div class="nav-section-label">Views</div>
      <button class="nav-item active" onclick="setView('all', this)">
        <span>Tyler's tasks</span>
        <span class="count" id="cnt-all">0</span>
      </button>
      <button class="nav-item" onclick="setView('active', this)">
        <span>Active</span>
        <span class="count" id="cnt-active">0</span>
      </button>
      <button class="nav-item" onclick="setView('done', this)">
        <span>Completed</span>
        <span class="count" id="cnt-done">0</span>
      </button>
    </div>

    <div>
      <div class="nav-section-label">Categories</div>
      <button class="nav-item" onclick="setCat('work', this)">
        <span><span class="cat-dot" style="background:#378ADD"></span>Work</span>
        <span class="count" id="cnt-work">0</span>
      </button>
      <button class="nav-item" onclick="setCat('personal', this)">
        <span><span class="cat-dot" style="background:#7F77DD"></span>Personal</span>
        <span class="count" id="cnt-personal">0</span>
      </button>
      <button class="nav-item" onclick="setCat('health', this)">
        <span><span class="cat-dot" style="background:#1D9E75"></span>Health</span>
        <span class="count" id="cnt-health">0</span>
      </button>
      <button class="nav-item" onclick="setCat('finance', this)">
        <span><span class="cat-dot" style="background:#BA7517"></span>Finance</span>
        <span class="count" id="cnt-finance">0</span>
      </button>
    </div>

    <div class="sidebar-footer">
      Tasks saved locally in your browser
    </div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div>
        <div class="page-title" id="page-title">Tyler's tasks</div>
        <div class="page-sub" id="page-sub">Everything in one place</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div class="lang-switcher">
          <button class="lang-btn active" onclick="setLang('en', this)">EN</button>
          <button class="lang-btn" onclick="setLang('zh', this)">中文</button>
        </div>
        <button class="add-btn" id="add-btn" onclick="openForm()">+ Add task</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-num" id="s-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-num" id="s-active">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Done</div>
        <div class="stat-num" id="s-done">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-num" id="s-overdue" style="color:var(--red)">0</div>
      </div>
    </div>

    <div class="prio-filters">
      <button class="prio-pill active" onclick="setPrio('all', this)">All priorities</button>
      <button class="prio-pill" onclick="setPrio('high', this)">High</button>
      <button class="prio-pill" onclick="setPrio('medium', this)">Medium</button>
      <button class="prio-pill" onclick="setPrio('low', this)">Low</button>
    </div>

    <div id="task-list"></div>
  </main>
</div>

<!-- Form modal -->
<div class="form-overlay" id="form-overlay" onclick="overlayClick(event)">
  <div class="form-card">
    <div class="form-title">New task</div>
    <div class="form-group">
      <label>Task name</label>
      <input type="text" id="inp-title" placeholder="What needs to be done?" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="inp-cat">
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="health">Health</option>
          <option value="finance">Finance</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="inp-prio">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Due date (optional)</label>
      <input type="date" id="inp-due" />
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Save task</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'taskflow_tasks';

const T = {
  en: {
    tylerTasks: "Tyler's tasks",
    everythingInOnePlace: 'Everything in one place',
    active: 'Active',
    activeTasks: 'Active tasks',
    tasksToComplete: 'Tasks to complete',
    completed: 'Completed',
    niceWork: 'Nice work!',
    views: 'Views',
    categories: 'Categories',
    work: 'Work', personal: 'Personal', health: 'Health', finance: 'Finance',
    total: 'Total', done: 'Done', overdue: 'Overdue',
    allPriorities: 'All priorities', high: 'High', medium: 'Medium', low: 'Low',
    newTask: 'New task', taskName: 'Task name', placeholder: 'What needs to be done?',
    category: 'Category', priority: 'Priority', dueDate: 'Due date (optional)',
    cancel: 'Cancel', save: 'Save task',
    addTask: '+ Add task',
    savedLocally: 'Tasks saved locally in your browser',
    noTasks: 'No tasks here. Add one above!',
    activeLabel: 'Active', completedLabel: 'Completed',
    dueTomorrow: 'Due tomorrow', dueToday: 'Due today',
    overdueBy: 'Overdue by', days: 'd', due: 'Due',
  },
  zh: {
    tylerTasks: 'Tyler 的任务',
    everythingInOnePlace: '所有任务一目了然',
    active: '进行中',
    activeTasks: '进行中的任务',
    tasksToComplete: '待完成的任务',
    completed: '已完成',
    niceWork: '做得好！',
    views: '视图',
    categories: '分类',
    work: '工作', personal: '个人', health: '健康', finance: '财务',
    total: '总计', done: '已完成', overdue: '已逾期',
    allPriorities: '所有优先级', high: '高', medium: '中', low: '低',
    newTask: '新任务', taskName: '任务名称', placeholder: '需要做什么？',
    category: '分类', priority: '优先级', dueDate: '截止日期（可选）',
    cancel: '取消', save: '保存任务',
    addTask: '+ 添加任务',
    savedLocally: '任务已保存在本地浏览器',
    noTasks: '这里没有任务，快去添加吧！',
    activeLabel: '进行中', completedLabel: '已完成',
    dueTomorrow: '明天截止', dueToday: '今天截止',
    overdueBy: '已逾期', days: '天', due: '截止于',
  }
};

let lang = 'en';

function setLang(l, el) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyTranslations();
  render();
}

function t(key) { return T[lang][key] || T.en[key]; }

function applyTranslations() {
  document.getElementById('add-btn').textContent = t('addTask');
  document.querySelector('.nav-section-label').textContent = t('views');
  document.querySelectorAll('.nav-section-label')[1].textContent = t('categories');
  document.querySelector('.sidebar-footer').textContent = t('savedLocally');
  document.querySelector('[onclick="setView(\'all\', this)"] span:first-child').textContent = t('tylerTasks');
  document.querySelector('[onclick="setView(\'active\', this)"] span:first-child').textContent = t('active');
  document.querySelector('[onclick="setView(\'done\', this)"] span:first-child').textContent = t('completed');
  document.querySelector('[onclick="setCat(\'work\', this)"] span:first-child').innerHTML = `<span class="cat-dot" style="background:#378ADD"></span>${t('work')}`;
  document.querySelector('[onclick="setCat(\'personal\', this)"] span:first-child').innerHTML = `<span class="cat-dot" style="background:#7F77DD"></span>${t('personal')}`;
  document.querySelector('[onclick="setCat(\'health\', this)"] span:first-child').innerHTML = `<span class="cat-dot" style="background:#1D9E75"></span>${t('health')}`;
  document.querySelector('[onclick="setCat(\'finance\', this)"] span:first-child').innerHTML = `<span class="cat-dot" style="background:#BA7517"></span>${t('finance')}`;
  document.querySelectorAll('.stat-label')[0].textContent = t('total');
  document.querySelectorAll('.stat-label')[1].textContent = t('active');
  document.querySelectorAll('.stat-label')[2].textContent = t('done');
  document.querySelectorAll('.stat-label')[3].textContent = t('overdue');
  document.querySelector('[onclick="setPrio(\'all\', this)"]').textContent = t('allPriorities');
  document.querySelector('[onclick="setPrio(\'high\', this)"]').textContent = t('high');
  document.querySelector('[onclick="setPrio(\'medium\', this)"]').textContent = t('medium');
  document.querySelector('[onclick="setPrio(\'low\', this)"]').textContent = t('low');
  document.querySelector('.form-title').textContent = t('newTask');
  document.querySelectorAll('.form-group label')[0].textContent = t('taskName');
  document.getElementById('inp-title').placeholder = t('placeholder');
  document.querySelectorAll('.form-group label')[1].textContent = t('category');
  document.querySelectorAll('.form-group label')[2].textContent = t('priority');
  document.querySelectorAll('.form-group label')[3].textContent = t('dueDate');
  document.querySelector('.btn-cancel').textContent = t('cancel');
  document.querySelector('.btn-save').textContent = t('save');
  const catSel = document.getElementById('inp-cat');
  catSel.options[0].text = t('work'); catSel.options[1].text = t('personal');
  catSel.options[2].text = t('health'); catSel.options[3].text = t('finance');
  const prioSel = document.getElementById('inp-prio');
  prioSel.options[0].text = t('high'); prioSel.options[1].text = t('medium'); prioSel.options[2].text = t('low');
  if (viewFilter === 'all') { document.getElementById('page-title').textContent = t('tylerTasks'); document.getElementById('page-sub').textContent = t('everythingInOnePlace'); }
  else if (viewFilter === 'active') { document.getElementById('page-title').textContent = t('activeTasks'); document.getElementById('page-sub').textContent = t('tasksToComplete'); }
  else if (viewFilter === 'done') { document.getElementById('page-title').textContent = t('completed'); document.getElementById('page-sub').textContent = t('niceWork'); }
}

let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || [
  {id:1, title:'Finish quarterly report', cat:'work', prio:'high', due:'2026-03-30', done:false},
  {id:2, title:'Schedule dentist appointment', cat:'health', prio:'medium', due:'2026-04-05', done:false},
  {id:3, title:'Pay electricity bill', cat:'finance', prio:'high', due:'2026-03-28', done:false},
  {id:4, title:'Plan weekend trip', cat:'personal', prio:'low', due:'2026-04-12', done:true},
];
let nextId = tasks.reduce((m,t) => Math.max(m,t.id), 0) + 1;

let viewFilter = 'all';
let catFilter = 'all';
let prioFilter = 'all';

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function openForm() {
  document.getElementById('form-overlay').classList.add('open');
  document.getElementById('inp-title').focus();
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('form-overlay')) closeForm();
}

document.getElementById('inp-title').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
  if (e.key === 'Escape') closeForm();
});

function addTask() {
  const title = document.getElementById('inp-title').value.trim();
  if (!title) { document.getElementById('inp-title').focus(); return; }
  tasks.unshift({
    id: nextId++,
    title,
    cat: document.getElementById('inp-cat').value,
    prio: document.getElementById('inp-prio').value,
    due: document.getElementById('inp-due').value,
    done: false
  });
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-due').value = '';
  save();
  closeForm();
  render();
}

function setView(v, el) {
  viewFilter = v;
  catFilter = 'all';
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const titles = {all:[t('tylerTasks'),t('everythingInOnePlace')], active:[t('activeTasks'),t('tasksToComplete')], done:[t('completed'),t('niceWork')]};
  document.getElementById('page-title').textContent = titles[v][0];
  document.getElementById('page-sub').textContent = titles[v][1];
  render();
}

function setCat(c, el) {
  catFilter = c;
  viewFilter = 'all';
  document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const labels = {work:t('work'),personal:t('personal'),health:t('health'),finance:t('finance')};
  document.getElementById('page-title').textContent = labels[c];
  document.getElementById('page-sub').textContent = labels[c] + (lang==='zh' ? '任务' : ' tasks');
  render();
}

function setPrio(p, el) {
  prioFilter = p;
  document.querySelectorAll('.prio-pill').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

function getDueInfo(due) {
  if (!due) return null;
  const d = new Date(due + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return {label: `${t('overdueBy')} ${Math.abs(diff)}${t('days')}`, cls:'overdue'};
  if (diff === 0) return {label: t('dueToday'), cls:'today'};
  if (diff === 1) return {label: t('dueTomorrow'), cls:''};
  return {label: t('due') + ' ' + d.toLocaleDateString(lang==='zh'?'zh-CN':'en-AU', {day:'numeric',month:'short'}), cls:''};
}

function prioSort(p) { return p==='high'?0:p==='medium'?1:2; }

function render() {
  let visible = tasks.filter(t => {
    if (viewFilter === 'active' && t.done) return false;
    if (viewFilter === 'done' && !t.done) return false;
    if (catFilter !== 'all' && t.cat !== catFilter) return false;
    if (prioFilter !== 'all' && t.prio !== prioFilter) return false;
    return true;
  });

  visible.sort((a, b) => a.done - b.done || prioSort(a.prio) - prioSort(b.prio));

  const today = new Date(); today.setHours(0,0,0,0);
  const overdue = tasks.filter(t => !t.done && t.due && new Date(t.due+'T00:00:00') < today).length;

  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-active').textContent = tasks.filter(t=>!t.done).length;
  document.getElementById('s-done').textContent = tasks.filter(t=>t.done).length;
  document.getElementById('s-overdue').textContent = overdue;

  ['all','active','done'].forEach(v => {
    const map = {all:tasks.length, active:tasks.filter(t=>!t.done).length, done:tasks.filter(t=>t.done).length};
    document.getElementById('cnt-'+v).textContent = map[v];
  });
  ['work','personal','health','finance'].forEach(c => {
    document.getElementById('cnt-'+c).textContent = tasks.filter(t=>t.cat===c).length;
  });

  const list = document.getElementById('task-list');
  if (!visible.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">✓</div><p>${t('noTasks')}</p></div>`;
    return;
  }

  const active = visible.filter(t=>!t.done);
  const done = visible.filter(t=>t.done);
  let html = '';

  if (active.length) {
    if (done.length) html += `<div class="section-label">${t('activeLabel')}</div>`;
    active.forEach(t => html += taskHTML(t));
  }
  if (done.length) {
    html += `<div class="section-label">${t('completedLabel')}</div>`;
    done.forEach(t => html += taskHTML(t));
  }

  list.innerHTML = html;
}

function taskHTML(task) {
  const due = task.due ? getDueInfo(task.due) : null;
  const catMap = {work:t('work'),personal:t('personal'),health:t('health'),finance:t('finance')};
  const prioMap = {high:t('high'),medium:t('medium'),low:t('low')};
  const catName = catMap[task.cat];
  const prioName = prioMap[task.prio];

  return `<div class="task-item${task.done?' done':''}">
    <div class="check-wrap${task.done?' checked':''}" onclick="toggleDone(${task.id})">
      <svg viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1.5,5.5 4,8 8.5,2"/>
      </svg>
    </div>
    <div class="task-body">
      <div class="task-name">${task.title}</div>
      <div class="task-meta">
        <span class="badge cat-${task.cat}">${catName}</span>
        <span class="badge prio-${task.prio}">${prioName}</span>
        ${due ? `<span class="due-badge ${due.cls}">${due.label}</span>` : ''}
      </div>
    </div>
    <div class="task-actions">
      <button class="task-del-btn" onclick="deleteTask(${task.id})" title="Delete">×</button>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
